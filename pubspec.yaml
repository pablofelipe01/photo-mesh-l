name: agro_cam
description: "AgroCam - Diagnóstico agrícola por foto via Meshtastic"
publish_to: 'none'
version: 1.0.9+10

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  meshtastic_flutter:
    path: packages/meshtastic_flutter
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  image_picker: ^1.0.7
  image: ^4.1.7
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
